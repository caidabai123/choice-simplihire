<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" fill="none">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bg-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1E3A8A;stop-opacity:0.1" />
      <stop offset="100%" style="stop-color:#3B82F6;stop-opacity:0.05" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="600" fill="url(#bg-gradient)"/>

  <!-- Decorative circles -->
  <circle cx="100" cy="100" r="80" fill="#1E3A8A" opacity="0.1"/>
  <circle cx="1100" cy="500" r="120" fill="#3B82F6" opacity="0.1"/>
  <circle cx="600" cy="300" r="200" fill="#1E3A8A" opacity="0.05"/>

  <!-- Team illustration -->
  <g transform="translate(800, 200)">
    <!-- Person 1 -->
    <circle cx="50" cy="30" r="20" fill="#1E3A8A" opacity="0.8"/>
    <rect x="30" y="55" width="40" height="60" rx="5" fill="#3B82F6" opacity="0.6"/>

    <!-- Person 2 -->
    <circle cx="120" cy="30" r="20" fill="#1E3A8A" opacity="0.8"/>
    <rect x="100" y="55" width="40" height="60" rx="5" fill="#3B82F6" opacity="0.6"/>

    <!-- Person 3 -->
    <circle cx="190" cy="30" r="20" fill="#1E3A8A" opacity="0.8"/>
    <rect x="170" y="55" width="40" height="60" rx="5" fill="#3B82F6" opacity="0.6"/>

    <!-- Connection lines -->
    <line x1="70" y1="30" x2="100" y2="30" stroke="#1E3A8A" stroke-width="2" opacity="0.5"/>
    <line x1="140" y1="30" x2="170" y2="30" stroke="#1E3A8A" stroke-width="2" opacity="0.5"/>
  </g>

  <!-- Globe icon -->
  <g transform="translate(200, 400)">
    <circle cx="50" cy="50" r="40" stroke="#3B82F6" stroke-width="2" fill="none" opacity="0.6"/>
    <path d="M10 50 Q50 10 90 50" stroke="#1E3A8A" stroke-width="2" fill="none" opacity="0.4"/>
    <path d="M10 50 Q50 90 90 50" stroke="#1E3A8A" stroke-width="2" fill="none" opacity="0.4"/>
    <line x1="50" y1="10" x2="50" y2="90" stroke="#3B82F6" stroke-width="2" opacity="0.4"/>
  </g>
</svg>